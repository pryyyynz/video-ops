<!doctype html>
<html><head><meta charset="utf-8"><title>Video Toolbox</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
 :root{color-scheme:dark}
 body{font-family:system-ui,Segoe UI,Roboto,sans-serif;background:#0e1116;color:#e6edf3;margin:0;padding:2rem;display:flex;justify-content:center}
 .card{width:100%;max-width:900px}
 h1{font-size:1.4rem;margin:0 0 .25rem}
 p.sub{color:#8b949e;margin:0 0 1.25rem}
 input[type=text]{width:100%;padding:.7rem;border-radius:8px;border:1px solid #30363d;background:#161b22;color:#e6edf3;font-size:1rem;box-sizing:border-box}
 .row{display:flex;gap:.75rem;align-items:center;margin:.75rem 0;flex-wrap:wrap}
 .divider{color:#6e7681;font-size:.85rem;text-align:center;margin:.5rem 0}
 button{padding:.7rem 1.2rem;border-radius:8px;border:0;background:#238636;color:#fff;font-size:1rem;cursor:pointer}
 button:disabled{background:#30363d;cursor:not-allowed}
 .muted{color:#8b949e;font-size:.9rem}

 /* input video preview */
 .prev{display:none;margin:.9rem 0 0}
 .prev.show{display:block}
 .prev video,.prev iframe{width:100%;aspect-ratio:16/9;border-radius:10px;border:1px solid #30363d;background:#000;display:block}

 /* task picker: three accent-coloured groups of checkbox-cards */
 .groups{display:grid;grid-template-columns:repeat(auto-fit,minmax(215px,1fr));gap:.8rem;margin:1.2rem 0 .2rem}
 .group{position:relative;border:1px solid #30363d;border-radius:14px;background:linear-gradient(180deg,#12171f,#0d1117);padding:0 .6rem .6rem;overflow:hidden}
 .group::before{content:"";position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--acc),transparent 85%)}
 .g-sum{--acc:#3fb950;--acc-dim:rgba(63,185,80,.14)}
 .g-cap{--acc:#58a6ff;--acc-dim:rgba(88,166,255,.14)}
 .g-hl{--acc:#bc8cff;--acc-dim:rgba(188,140,255,.14)}
 .ghead{display:flex;align-items:center;gap:.55rem;padding:.75rem .35rem .6rem;font-size:.78rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#e6edf3}
 .ghead .gicon{width:26px;height:26px;border-radius:8px;display:grid;place-items:center;background:var(--acc-dim);font-size:.85rem}
 label.task{position:relative;display:block;border:1px solid #21262d;background:#0d1117;border-radius:10px;padding:.55rem 2.1rem .6rem .65rem;cursor:pointer;transition:border-color .15s,background .15s,transform .15s}
 label.task + label.task{margin-top:.4rem}
 label.task:hover{transform:translateY(-1px);border-color:#8b949e}
 label.task:has(input:checked){border-color:var(--acc);background:var(--acc-dim)}
 .task input{position:absolute;opacity:0;pointer-events:none}
 .task .t{font-weight:600;font-size:.92rem}
 .task .d{color:#8b949e;font-size:.78rem;margin-top:.12rem;line-height:1.35}
 .task .chk{position:absolute;top:.55rem;right:.55rem;width:18px;height:18px;border-radius:50%;border:1.5px solid #30363d;display:grid;place-items:center;font-size:.62rem;color:transparent;transition:all .15s}
 .task:has(input:checked) .chk{background:var(--acc);border-color:var(--acc);color:#0d1117}

 /* per-task options */
 .opts{display:none;margin:.6rem 0 0;align-items:center;gap:.75rem}
 .opts.show{display:flex}
 .optlabel{color:#8b949e;font-size:.85rem}
 .seg{display:inline-flex;border:1px solid #30363d;border-radius:8px;overflow:hidden}
 .seg button{background:#161b22;border:0;border-radius:0;padding:.45rem .8rem;font-size:.9rem;color:#e6edf3}
 .seg button.sel{background:#238636}

 /* progress */
 .panel{margin-top:1.5rem;padding:1rem 1.25rem;border:1px solid #30363d;border-radius:10px;background:#161b22;display:none}
 .bar{height:8px;background:#30363d;border-radius:4px;overflow:hidden;margin:.75rem 0}
 .bar>div{height:100%;width:0;background:#238636;transition:width .5s}
 .stage{font-weight:600}
 .err{color:#f85149}
 .tlist{display:flex;gap:.5rem;flex-wrap:wrap;margin:.6rem 0 .2rem}
 .titem{display:inline-flex;align-items:center;border:1px solid #30363d;border-radius:999px;padding:.25rem .75rem;font-size:.8rem;color:#8b949e}
 .titem.running{color:#e6edf3;border-color:#58a6ff}
 .titem.running::before{content:"";width:7px;height:7px;border-radius:50%;background:#58a6ff;display:inline-block;margin-right:.45rem;animation:pulse 1.2s infinite}
 .titem.done{color:#3fb950;border-color:#238636}
 .titem.done::before{content:"\2713";margin-right:.4rem}
 @keyframes pulse{0%,100%{opacity:.35}50%{opacity:1}}

 /* results: one card per finished task */
 #results{margin-top:1.25rem}
 .rescard{border:1px solid #30363d;border-radius:12px;background:#161b22;margin-top:1rem;overflow:hidden;animation:fadein .25s ease}
 @keyframes fadein{from{opacity:0;transform:translateY(4px)}}
 .rhead{display:flex;justify-content:space-between;align-items:center;gap:.75rem;padding:.65rem .95rem;border-bottom:1px solid #21262d;font-weight:600}
 .rbody{padding:.9rem .95rem 1rem}
 a.dlmini{padding:.35rem .75rem;border-radius:6px;background:#1f6feb;color:#fff;text-decoration:none;font-size:.8rem;white-space:nowrap}
 .note{margin:0 0 .8rem;padding:.5rem .75rem;border:1px solid #9e6a03;background:#1b1300;color:#d29922;border-radius:8px;font-size:.85rem}
 .md h2{border-bottom:1px solid #30363d;padding-bottom:.3rem}
 .md :first-child{margin-top:.2rem}
 .caps{max-height:320px;overflow:auto;border:1px solid #30363d;border-radius:8px;background:#0d1117}
 .cap{display:flex;gap:.9rem;padding:.45rem .9rem;font-size:.92rem;border-bottom:1px solid #21262d}
 .cap:last-child{border-bottom:0}
 .cap .t{color:#58a6ff;font-variant-numeric:tabular-nums;white-space:nowrap}
 .rbody video{width:100%;border-radius:10px;border:1px solid #30363d;background:#000;margin-bottom:.75rem}
</style></head>
<body><div class="card">
 <h1>&#127916; Video Toolbox</h1>
 <p class="sub">Summarise, caption, or cut highlights from a video &mdash; everything runs locally.</p>

 <input id="url" type="text" placeholder="https://youtu.be/...">
 <div class="divider">&mdash; or &mdash;</div>
 <div class="row"><input id="file" type="file" accept="video/*"></div>
 <div id="prev" class="prev">
  <video id="pv" controls style="display:none"></video>
  <iframe id="py" style="display:none" allowfullscreen allow="encrypted-media; picture-in-picture"></iframe>
 </div>

 <div class="groups">
  <div class="group g-sum">
   <div class="ghead"><span class="gicon">&#128221;</span>Summarise</div>
   <label class="task" id="task-football_recap"><input type="checkbox" name="task" value="football_recap" checked>
    <span class="chk">&#10003;</span>
    <div class="t">&#9917; Football recap</div>
    <div class="d">Timestamped match report: result, goals, trends</div></label>
   <label class="task" id="task-video_summary"><input type="checkbox" name="task" value="video_summary">
    <span class="chk">&#10003;</span>
    <div class="t">&#127909; Any video</div>
    <div class="d">General summary from speech and visuals</div></label>
  </div>
  <div class="group g-cap">
   <div class="ghead"><span class="gicon">&#128172;</span>Captions</div>
   <label class="task" id="task-subtitles"><input type="checkbox" name="task" value="subtitles">
    <span class="chk">&#10003;</span>
    <div class="t">&#128172; Subtitles</div>
    <div class="d">Speech &rarr; timed captions, downloadable</div></label>
   <label class="task" id="task-visual_captions"><input type="checkbox" name="task" value="visual_captions">
    <span class="chk">&#10003;</span>
    <div class="t">&#128064; Visual captions</div>
    <div class="d">Timed descriptions of what's on screen</div></label>
  </div>
  <div class="group g-hl">
   <div class="ghead"><span class="gicon">&#9986;&#65039;</span>Highlights</div>
   <label class="task" id="task-highlights"><input type="checkbox" name="task" value="highlights">
    <span class="chk">&#10003;</span>
    <div class="t">&#9917; Football highlights</div>
    <div class="d">Key moments cut into a short reel</div></label>
  </div>
 </div>

 <div id="opt-format" class="opts"><span class="optlabel">Caption format</span>
  <div class="seg" id="segfmt"><button data-v="srt" class="sel">SRT</button><button data-v="vtt">VTT</button></div>
 </div>
 <div id="opt-target" class="opts"><span class="optlabel">Highlights length</span>
  <div class="seg" id="segtgt"><button data-v="3">3 min</button><button data-v="5" class="sel">5 min</button><button data-v="10">10 min</button></div>
 </div>

 <input type="hidden" id="whisper" value="medium">
 <div class="row"><button id="go">Summarise match</button><span id="hint" class="muted"></span></div>

 <div id="progress" class="panel">
  <div class="stage" id="stage">Starting...</div>
  <div class="bar"><div id="fill"></div></div>
  <div class="tlist" id="tlist"></div>
  <div class="muted"><span id="remaining"></span> &middot; <span id="etatext"></span></div>
 </div>

 <div id="results"></div>
</div>

<script>
const $=id=>document.getElementById(id);
const fmtT=s=>{s=Math.max(0,Math.round(s));return Math.floor(s/60)+":"+String(s%60).padStart(2,'0')};
const META={
 football_recap:{label:'Football recap',icon:'⚽',go:'Summarise match'},
 video_summary:{label:'Video summary',icon:'🎥',go:'Summarise video'},
 subtitles:{label:'Subtitles',icon:'💬',go:'Generate subtitles'},
 visual_captions:{label:'Visual captions',icon:'👀',go:'Describe video'},
 highlights:{label:'Highlights',icon:'✂️',go:'Cut highlights'}};
let fmt='srt', target='5', rendered=0;
const selected=()=>[...document.querySelectorAll('input[name=task]:checked')].map(i=>i.value);

document.querySelectorAll('input[name=task]').forEach(c=>c.onchange=onTasks);
function onTasks(){
 const sel=selected();
 $('go').disabled=sel.length===0;
 $('go').textContent=sel.length===0?'Pick a task':sel.length===1?META[sel[0]].go:'Run '+sel.length+' tasks';
 $('opt-format').classList.toggle('show',sel.includes('subtitles')||sel.includes('visual_captions'));
 $('opt-target').classList.toggle('show',sel.includes('highlights'));
}
onTasks();

function seg(el,set){el.querySelectorAll('button').forEach(b=>b.onclick=()=>{
 el.querySelectorAll('button').forEach(x=>x.classList.remove('sel'));b.classList.add('sel');set(b.dataset.v);});}
seg($('segfmt'),v=>fmt=v); seg($('segtgt'),v=>target=v);

/* ---- input video preview: upload -> object URL; YouTube -> embed; direct link -> player */
const YT=/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|shorts\/|embed\/))([\w-]{11})/;
let objUrl=null;
function showPrev(kind,src){
 const v=$('pv'),y=$('py');
 v.style.display=kind==='video'?'block':'none';
 y.style.display=kind==='yt'?'block':'none';
 if(kind==='video'){v.src=src;}else{v.removeAttribute('src');}
 if(kind==='yt'){y.src='https://www.youtube-nocookie.com/embed/'+src;}else{y.removeAttribute('src');}
 $('prev').classList.toggle('show',!!kind);
}
$('file').onchange=()=>{
 const f=$('file').files[0];
 if(!f)return showPrev(null);
 $('url').value='';
 if(objUrl)URL.revokeObjectURL(objUrl);
 objUrl=URL.createObjectURL(f);
 showPrev('video',objUrl);
};
$('url').oninput=()=>{
 const u=$('url').value.trim();
 if(u&&$('file').files.length){$('file').value='';}
 const m=u.match(YT);
 if(m)showPrev('yt',m[1]);
 else if(/\.(mp4|webm|mov|m4v|mkv)([?#]|$)/i.test(u))showPrev('video',u);
 else showPrev(null);
};

/* ---- submit + poll */
$('go').onclick=async()=>{
 const url=$('url').value.trim(), file=$('file').files[0];
 if(!url&&!file){$('hint').textContent='Enter a link or choose a file.';return;}
 $('go').disabled=true;$('hint').textContent='';
 $('results').innerHTML='';rendered=0;
 const fd=new FormData(); if(url)fd.append('url',url); else fd.append('file',file);
 fd.append('tasks',selected().join(',')); fd.append('format',fmt); fd.append('target',target);
 fd.append('whisper',$('whisper').value);
 let r; try{r=await(await fetch('/process',{method:'POST',body:fd})).json();}
 catch(e){$('hint').textContent='Request failed.';onTasks();return;}
 if(r.error){$('hint').textContent=r.error;onTasks();return;}
 $('progress').style.display='block';
 $('etatext').textContent=r.duration>0?'est. '+fmtT(r.eta)+' for a '+fmtT(r.duration)+' video':'est. '+fmtT(r.eta);
 poll(r.job_id);
};

async function poll(id){
 let s; try{s=await(await fetch('/status/'+id)).json();}catch(e){return setTimeout(()=>poll(id),2500);}
 $('stage').textContent=s.stage;
 $('fill').style.width=Math.min(100,100*s.elapsed/Math.max(1,s.eta))+'%';
 $('remaining').textContent=s.done?'done':('~'+fmtT(s.remaining)+' left');
 chips(s);
 for(;rendered<(s.results||[]).length;rendered++)addResult(s.results[rendered]);
 if(s.done){
  onTasks();
  if(s.error){$('stage').innerHTML='<span class="err">Failed: '+s.error+'</span>';return;}
  $('fill').style.width='100%';
  return;
 }
 setTimeout(()=>poll(id),2000);
}

function chips(s){
 const box=$('tlist');box.innerHTML='';
 const doneIds=new Set((s.results||[]).map(r=>r.task));
 for(const t of s.tasks||[]){
  const c=document.createElement('span');
  c.className='titem '+(doneIds.has(t.id)?'done':(s.current===t.id&&!s.done?'running':''));
  c.textContent=(META[t.id]?META[t.id].icon+' ':'')+t.label;
  box.append(c);
 }
}

/* ---- result cards */
const el=(tag,cls)=>{const e=document.createElement(tag);if(cls)e.className=cls;return e};
function mini(href,label){const a=el('a','dlmini');a.href=href;a.download='';a.textContent=label;return a}
function capsEl(items){
 const box=el('div','caps');
 for(const c of items||[]){
  const row=el('div','cap'),t=el('span','t'),x=el('span');
  t.textContent=fmtT(c.start)+(c.end!=null?' → '+fmtT(c.end):'');
  x.textContent=c.text;row.append(t,x);box.append(row);
 }
 return box;
}
function addResult(r){
 const card=el('div','rescard'),head=el('div','rhead'),body=el('div','rbody');
 const title=el('span');
 title.textContent=META[r.task]?META[r.task].icon+' '+META[r.task].label:r.task;
 head.append(title);
 if(r.type==='captions'&&r.download)head.append(mini(r.download,'Download '+fmt.toUpperCase()));
 if(r.type==='video')head.append(mini(r.src,'Download video'));
 if(r.note){const n=el('div','note');n.textContent=r.note;body.append(n);}
 if(r.type==='markdown'){
  const d=el('div','md');
  d.innerHTML=window.marked?marked.parse(r.markdown):'<pre>'+r.markdown+'</pre>';
  body.append(d);
 }else if(r.type==='captions'){
  body.append(capsEl(r.segments));
 }else if(r.type==='video'){
  const v=el('video');v.controls=true;v.src=r.src;body.append(v);
  if(r.items&&r.items.length)body.append(capsEl(r.items));
 }
 card.append(head,body);$('results').append(card);
}
</script></body></html>
